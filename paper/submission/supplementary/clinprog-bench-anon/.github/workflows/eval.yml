name: eval

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  schema-lint:
    name: Schema & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Validate task schemas
        run: uv run clinprog-bench validate tasks/

      - name: Ruff check
        run: uv run ruff check .

      - name: Black check
        run: uv run black --check .

      - name: Mypy strict
        run: uv run mypy src/

  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Run pytest
        run: uv run pytest -v

  baseline:
    name: Dummy Baseline Run
    runs-on: ubuntu-latest
    needs: [schema-lint, unit]
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync

      - name: Validate tasks (baseline smoke test)
        run: uv run clinprog-bench validate tasks/
